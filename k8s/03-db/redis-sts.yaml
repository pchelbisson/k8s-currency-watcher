apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: currency-watcher
spec:
  serviceName: "redis-headless"
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7.2-alpine
        ports:
          - containerPort: 6379
        volumeMounts:
          - mountPath: /data
            name: redis-data
      volumes:
        - name: redis-data
          hostPath:
            path: /var/lib/redis-local
            type: DirectoryOrCreate