apiVersion: batch/v1
kind: CronJob
metadata:
  name: currency-cleanup
  namespace: currency-watcher
spec:
  schedule: "*/1 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: cleaner
            image: busybox
            command: ["sh", "-c", "echo 'Cleaning up old currency data from Redis...'"]
          restartPolicy: OnFailure
  successfulJobsHistoryLimit: 3