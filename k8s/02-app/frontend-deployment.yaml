---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: currency-frontend
  namespace: currency-watcher
  labels:
    app: currency-watcher
    tier: frontend
spec:
  replicas: 3
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: currency-watcher
      tier: frontend
  template:
    metadata:   
      labels: 
        app: currency-watcher
        tier: frontend
    spec:
      containers:
      - name: web-dashboard
        image: nginx:1.27.5
        ports:
          - containerPort: 80
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        livenessProbe:
          tcpSocket:
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10